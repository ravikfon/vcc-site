<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Administrativo</title>

<style>

*{
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
margin:0;
background:#f1f1f1;
}

.menu{
position:fixed;
width:220px;
height:100%;
background:#111;
color:white;
padding:20px;
}

.menu h2{
text-align:center;
}

.menu button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
background:#0066ff;
color:white;
border-radius:5px;
}

.conteudo{
margin-left:220px;
padding:30px;
}

.cards{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.card{
background:white;
padding:20px;
width:200px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
}

.card h3{
margin:0;
color:#0066ff;
}

@media(max-width:600px){

.menu{
position:relative;
width:100%;
height:auto;
}

.conteudo{
margin-left:0;
}

}

</style>

</head>


<body>


<div class="menu">

<h2>ADMIN</h2>

<button>Início</button>

<button onclick="abrirUsuarios()">Usuários</button>

<button onclick="abrirEquipes()">Equipes</button>

<button>Configurações</button>

<button>Configurações</button>

<button onclick="sair()">Sair</button>

</div>



<div class="conteudo">

<h1>Bem-vindo ao Painel</h1>

<p>Área administrativa do sistema.</p>


<div class="cards">

<div class="card">
<h3 id="totalUsuarios">0</h3>
<p>Usuários</p>
</div>


<div class="card">
<h3>0</h3>
<p>Cadastros</p>
</div>


<div class="card">
<h3>0</h3>
<p>Visitas</p>
</div>


</div>


</div>



<script>

function sair(){

window.location="admin.html";

}


function abrirUsuarios(){

window.location="usuarios.html";

}

function abrirEquipes(){

window.location="equipes.html";

}

let listaUsuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

document.getElementById("totalUsuarios").innerHTML = listaUsuarios.length;


</script>


</body>
</html>
