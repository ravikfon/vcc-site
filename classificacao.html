<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Classificação VCC</title>

<style>

body{
font-family:Arial;
background:#f1f1f1;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:800px;
margin:auto;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #ccc;
text-align:center;
}

th{
background:#111;
color:white;
}

.lider{
background:#fff3cd;
font-weight:bold;
}

</style>

</head>


<body>


<div class="container">

<h2>🏆 Classificação VCC</h2>


<table>

<thead>

<tr>

<th>Pos</th>
<th>Equipe</th>
<th>Jogos</th>
<th>Vitórias</th>
<th>Derrotas</th>
<th>Saldo</th>
<th>Pontos</th>

</tr>

</thead>


<tbody id="tabela"></tbody>


</table>


</div>



<script>


let equipes = JSON.parse(localStorage.getItem("equipes")) || [];

let partidas = JSON.parse(localStorage.getItem("partidas")) || [];



let tabela = [];



equipes.forEach(e=>{

tabela.push({

nome:e.nome,

jogos:0,

vitorias:0,

derrotas:0,

saldo:0,

pontos:0

});

});





partidas.forEach(p=>{


if(p.finalizada){


let time1 = tabela.find(t=>t.nome === p.time1);

let time2 = tabela.find(t=>t.nome === p.time2);



if(time1 && time2){


time1.jogos++;

time2.jogos++;



let placar1 = Number(p.placar1);

let placar2 = Number(p.placar2);



time1.saldo += placar1 - placar2;

time2.saldo += placar2 - placar1;



if(placar1 > placar2){


time1.vitorias++;

time2.derrotas++;

time1.pontos += 3;


}

else if(placar2 > placar1){


time2.vitorias++;

time1.derrotas++;

time2.pontos += 3;


}

else{


time1.pontos++;

time2.pontos++;


}


}


}


});




// Ordenação do campeonato

tabela.sort((a,b)=>{


if(b.pontos !== a.pontos){

return b.pontos - a.pontos;

}


if(b.vitorias !== a.vitorias){

return b.vitorias - a.vitorias;

}


return b.saldo - a.saldo;


});




let corpo=document.getElementById("tabela");



tabela.forEach((e,index)=>{


corpo.innerHTML += `

<tr class="${index===0 ? "lider":""}">

<td>${index+1}º</td>

<td>${e.nome}</td>

<td>${e.jogos}</td>

<td>${e.vitorias}</td>

<td>${e.derrotas}</td>

<td>${e.saldo}</td>

<td>${e.pontos}</td>

</tr>

`;

});


</script>


</body>

</html>
