<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Classificação VCC</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f1f1f1;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:1000px;
margin:auto;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #ccc;
text-align:center;
}

th{
background:#111;
color:white;
}

.lider{
background:#fff3cd;
font-weight:bold;
}


</style>

</head>


<body>


<div class="container">


<h2>🏆 Classificação VCC</h2>


<table>

<thead>

<tr>

<th>Pos</th>

<th>Equipe</th>

<th>Jogos</th>

<th>Vitórias</th>

<th>Derrotas</th>

<th>Mapas</th>

<th>Rounds</th>

<th>Saldo</th>

<th>Pontos</th>

</tr>

</thead>


<tbody id="tabela"></tbody>


</table>


</div>



<script>


let equipes = JSON.parse(localStorage.getItem("equipes")) || [];

let partidas = JSON.parse(localStorage.getItem("partidas")) || [];



let tabela = [];



equipes.forEach(e=>{


tabela.push({

nome:e.nome,

jogos:0,

vitorias:0,

derrotas:0,

mapasV:0,

mapasD:0,

roundsF:0,

roundsS:0,

saldo:0,

pontos:0

});


});
// Ler partidas finalizadas

partidas.forEach(p=>{


if(p.finalizada){


let time1 = tabela.find(t=>t.nome === p.time1);

let time2 = tabela.find(t=>t.nome === p.time2);



if(time1 && time2){


time1.jogos++;

time2.jogos++;



// Mapas

time1.mapasV += Number(p.mapas1);
time1.mapasD += Number(p.mapas2);


time2.mapasV += Number(p.mapas2);
time2.mapasD += Number(p.mapas1);



// Rounds

time1.roundsF += Number(p.rounds1);
time1.roundsS += Number(p.rounds2);


time2.roundsF += Number(p.rounds2);
time2.roundsS += Number(p.rounds1);



// Saldo de rounds

time1.saldo += Number(p.rounds1) - Number(p.rounds2);

time2.saldo += Number(p.rounds2) - Number(p.rounds1);



// Resultado da série MD3

if(Number(p.mapas1) > Number(p.mapas2)){


time1.vitorias++;

time2.derrotas++;

time1.pontos += 3;


}

else{


time2.vitorias++;

time1.derrotas++;

time2.pontos += 3;


}



}


}


});





// Ordenação

tabela.sort((a,b)=>{


if(b.pontos !== a.pontos){

return b.pontos - a.pontos;

}


if(b.vitorias !== a.vitorias){

return b.vitorias - a.vitorias;

}


return b.saldo - a.saldo;


});





// Salvar classificação para os playoffs

localStorage.setItem(
"classificacaoFinal",
JSON.stringify(tabela)
);


// Mostrar tabela

let corpo = document.getElementById("tabela");



tabela.forEach((e,index)=>{


corpo.innerHTML += `

<tr class="${index===0 ? "lider":""}">


<td>${index+1}º</td>

<td>${e.nome}</td>

<td>${e.jogos}</td>

<td>${e.vitorias}</td>

<td>${e.derrotas}</td>

<td>${e.mapasV}-${e.mapasD}</td>

<td>${e.roundsF}-${e.roundsS}</td>

<td>${e.saldo}</td>

<td>${e.pontos}</td>


</tr>

`;

});



</script>


</body>

</html>
