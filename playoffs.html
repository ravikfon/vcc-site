<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Playoffs VCC</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f1f1f1;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:800px;
margin:auto;
}

h2{
text-align:center;
}


button{
width:100%;
padding:12px;
margin-top:10px;
background:#0066ff;
color:white;
border:none;
border-radius:5px;
font-size:16px;
}


.jogo{

background:#eee;
padding:15px;
margin-top:15px;
border-radius:10px;
text-align:center;

}


.vencedor{

background:#d4ffd4;

}


.final{

background:#fff3cd;

}


.campeao{

background:#ffd700;
font-weight:bold;
font-size:20px;

}


</style>

</head>


<body>


<div class="container">


<h2>🏆 Playoffs VCC</h2>


<button onclick="gerarPlayoffs()">

Gerar Chave dos Playoffs

</button>


<div id="chave"></div>


</div>

<script>

let playoffs = JSON.parse(localStorage.getItem("playoffs")) || {};



function gerarPlayoffs(){


let tabela = JSON.parse(localStorage.getItem("classificacaoFinal")) || [];


let tabela = [];



equipes.forEach(e=>{


tabela.push({

nome:e.nome,

pontos:0,

vitorias:0,

derrotas:0,

saldo:0

});


});



partidas.forEach(p=>{


if(p.finalizada){


let t1 = tabela.find(t=>t.nome === p.time1);

let t2 = tabela.find(t=>t.nome === p.time2);



if(t1 && t2){


let p1 = Number(p.placar1);

let p2 = Number(p.placar2);



t1.saldo += p1 - p2;

t2.saldo += p2 - p1;



if(p1 > p2){

t1.pontos += 3;

t1.vitorias++;

t2.derrotas++;

}


else if(p2 > p1){

t2.pontos += 3;

t2.vitorias++;

t1.derrotas++;

}


else{

t1.pontos++;

t2.pontos++;

}


}


}


});



tabela.sort((a,b)=>{


if(b.pontos !== a.pontos)

return b.pontos-a.pontos;


if(b.vitorias !== a.vitorias)

return b.vitorias-a.vitorias;


return b.saldo-a.saldo;


});



if(tabela.length < 6){

alert("É necessário ter 6 equipes!");

return;

}



playoffs={


primeiro:tabela[0].nome,

segundo:tabela[1].nome,


playoff1:{

time1:tabela[2].nome,

time2:tabela[5].nome,

vencedor:""

},


playoff2:{

time1:tabela[3].nome,

time2:tabela[4].nome,

vencedor:""

},


semi:{

time1:tabela[1].nome,

time2:"",

vencedor:""

},


final:{

time1:tabela[0].nome,

time2:"",

formato:"MD5",

vencedor:""

}


};


localStorage.setItem(
"playoffs",
JSON.stringify(playoffs)
);


mostrar();


}
function definirVencedor(fase){


let vencedor = prompt("Digite o nome da equipe vencedora");


if(!vencedor)return;



if(fase==="playoff1"){

playoffs.playoff1.vencedor=vencedor;

}



if(fase==="playoff2"){

playoffs.playoff2.vencedor=vencedor;

}



if(
playoffs.playoff1.vencedor &&
playoffs.playoff2.vencedor
){

playoffs.semi.time2 = playoffs.playoff1.vencedor;

playoffs.semi.time2 = 
playoffs.playoff1.vencedor + " / " + playoffs.playoff2.vencedor;

}



if(fase==="semi"){

playoffs.semi.vencedor=vencedor;

playoffs.final.time2=vencedor;

}



if(fase==="final"){

playoffs.final.vencedor=vencedor;

}



salvar();

mostrar();


}




function salvar(){

localStorage.setItem(
"playoffs",
JSON.stringify(playoffs)
);

}





function mostrar(){


let div=document.getElementById("chave");


if(!div)return;


div.innerHTML="";



if(!playoffs.playoff1)return;



div.innerHTML += `


<div class="jogo">

<h3>🔥 Playoff 1</h3>

${playoffs.playoff1.time1}

🆚

${playoffs.playoff1.time2}


<button onclick="definirVencedor('playoff1')">

Definir vencedor

</button>

</div>



<div class="jogo">

<h3>🔥 Playoff 2</h3>

${playoffs.playoff2.time1}

🆚

${playoffs.playoff2.time2}


<button onclick="definirVencedor('playoff2')">

Definir vencedor

</button>

</div>



<div class="jogo vencedor">

<h3>⚔️ Semifinal</h3>


${playoffs.semi.time1}

🆚

${playoffs.semi.time2 || "Aguardando"}


<button onclick="definirVencedor('semi')">

Definir vencedor

</button>

</div>



<div class="jogo final">

<h3>🏆 FINAL MD5</h3>


${playoffs.final.time1}

🆚

${playoffs.final.time2 || "Aguardando"}


<button onclick="definirVencedor('final')">

Definir campeão

</button>

</div>


`;


if(playoffs.final.vencedor){


div.innerHTML += `

<div class="jogo campeao">

🏆 CAMPEÃO VCC

<br>

${playoffs.final.vencedor}

</div>

`;

}


}



mostrar();


</script>


</body>

</html>
