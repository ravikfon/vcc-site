<body>


<div class="container">


<h2>🏆 Playoffs VCC</h2>


<button onclick="gerarPlayoffs()">

Gerar Chave dos Playoffs

</button>


<div id="chave"></div>


</div>

<script>

let playoffs = JSON.parse(localStorage.getItem("playoffs")) || {};



function gerarPlayoffs(){


let equipes = JSON.parse(localStorage.getItem("equipes")) || [];

let partidas = JSON.parse(localStorage.getItem("partidas")) || [];


let tabela = [];



equipes.forEach(e=>{


tabela.push({

nome:e.nome,

pontos:0,

vitorias:0,

derrotas:0,

saldo:0

});


});



partidas.forEach(p=>{


if(p.finalizada){


let t1 = tabela.find(t=>t.nome === p.time1);

let t2 = tabela.find(t=>t.nome === p.time2);



if(t1 && t2){


let p1 = Number(p.placar1);

let p2 = Number(p.placar2);



t1.saldo += p1 - p2;

t2.saldo += p2 - p1;



if(p1 > p2){

t1.pontos += 3;

t1.vitorias++;

t2.derrotas++;

}


else if(p2 > p1){

t2.pontos += 3;

t2.vitorias++;

t1.derrotas++;

}


else{

t1.pontos++;

t2.pontos++;

}


}


}


});



tabela.sort((a,b)=>{


if(b.pontos !== a.pontos)

return b.pontos-a.pontos;


if(b.vitorias !== a.vitorias)

return b.vitorias-a.vitorias;


return b.saldo-a.saldo;


});



if(tabela.length < 6){

alert("É necessário ter 6 equipes!");

return;

}



playoffs={


primeiro:tabela[0].nome,

segundo:tabela[1].nome,


playoff1:{

time1:tabela[2].nome,

time2:tabela[5].nome,

vencedor:""

},


playoff2:{

time1:tabela[3].nome,

time2:tabela[4].nome,

vencedor:""

},


semi:{

time1:tabela[1].nome,

time2:"",

vencedor:""

},


final:{

time1:tabela[0].nome,

time2:"",

formato:"MD5",

vencedor:""

}


};


localStorage.setItem(
"playoffs",
JSON.stringify(playoffs)
);


mostrar();


}
