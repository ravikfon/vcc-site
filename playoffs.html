<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Playoffs VCC</title>

<style>

body{
font-family:Arial;
background:#f1f1f1;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:700px;
margin:auto;
}

.jogo{
background:#eee;
padding:15px;
margin-top:15px;
border-radius:10px;
}

button{
background:#0066ff;
color:white;
border:none;
padding:10px;
border-radius:5px;
width:100%;
margin-top:10px;
}

.final{
background:#fff3cd;
}

</style>

</head>


<body>


<div class="container">


<h2>🏆 Playoffs VCC</h2>


<button onclick="gerarChave()">
Gerar Chave dos Playoffs
</button>


<div id="chave"></div>


</div>



<script>


let playoffs = JSON.parse(localStorage.getItem("playoffs")) || {};



function gerarChave(){


let equipes = JSON.parse(localStorage.getItem("equipes")) || [];



let ranking = equipes.map(e=>{

return {

nome:e.nome,
pontos:e.pontos || 0

};

});



ranking.sort((a,b)=>b.pontos-a.pontos);



if(ranking.length < 6){

alert("Precisa ter 6 equipes cadastradas!");

return;

}



playoffs={

primeiro:ranking[0].nome,

segundo:ranking[1].nome,


jogoA:{
time1:ranking[2].nome,
time2:ranking[5].nome,
vencedor:""
},


jogoB:{
time1:ranking[3].nome,
time2:ranking[4].nome,
vencedor:""
},


semi:{
time1:"",
time2:"",
vencedor:""
},


final:{
time1:"",
time2:"",
formato:"MD5",
vencedor:""
}


};



localStorage.setItem(
"playoffs",
JSON.stringify(playoffs)
);


mostrar();


}



function escolherVencedor(tipo){


let vencedor = prompt("Digite o nome da equipe vencedora");


if(!vencedor)return;



if(tipo==="A"){

playoffs.jogoA.vencedor=vencedor;

}


if(tipo==="B"){

playoffs.jogoB.vencedor=vencedor;

}


localStorage.setItem(
"playoffs",
JSON.stringify(playoffs)
);


mostrar();


}



function mostrar(){


let div=document.getElementById("chave");


div.innerHTML="";



if(!playoffs.jogoA)return;



div.innerHTML+=`

<div class="jogo">

<h3>Playoff 1</h3>

${playoffs.jogoA.time1} 🆚 ${playoffs.jogoA.time2}

<button onclick="escolherVencedor('A')">

Definir vencedor

</button>

</div>



<div class="jogo">

<h3>Playoff 2</h3>

${playoffs.jogoB.time1} 🆚 ${playoffs.jogoB.time2}


<button onclick="escolherVencedor('B')">

Definir vencedor

</button>

</div>



<div class="jogo final">

<h3>🏆 Final VCC - MD5</h3>

1º Lugar: ${playoffs.primeiro}

<br>

Aguardando semifinal

</div>

`;

}



mostrar();


</script>


</body>

</html>
