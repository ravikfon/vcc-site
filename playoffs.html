<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Playoffs VCC</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f1f1f1;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:800px;
margin:auto;
}

h2{
text-align:center;
}


button{
width:100%;
padding:12px;
margin-top:10px;
background:#0066ff;
color:white;
border:none;
border-radius:5px;
font-size:16px;
}


.jogo{

background:#eee;
padding:15px;
margin-top:15px;
border-radius:10px;
text-align:center;

}


.vencedor{

background:#d4ffd4;

}


.final{

background:#fff3cd;

}


.campeao{

background:#ffd700;
font-weight:bold;
font-size:20px;

}


</style>

</head>


<body>


<div class="container">


<h2>🏆 Playoffs VCC</h2>


<button onclick="gerarPlayoffs()">

Gerar Chave dos Playoffs

</button>


<div id="chave"></div>


</div>

<script>

let playoffs = JSON.parse(localStorage.getItem("playoffs")) || {};



function gerarPlayoffs(){


let equipes = JSON.parse(localStorage.getItem("equipes")) || [];

let partidas = JSON.parse(localStorage.getItem("partidas")) || [];


let classificacao = [];



equipes.forEach(e=>{


classificacao.push({

nome:e.nome,

pontos:0,

vitorias:0,

derrotas:0,

saldo:0

});


});



partidas.forEach(p=>{


if(p.finalizada){


let time1 = classificacao.find(t=>t.nome === p.time1);

let time2 = classificacao.find(t=>t.nome === p.time2);



if(time1 && time2){


let placar1 = Number(p.placar1);

let placar2 = Number(p.placar2);



time1.saldo += placar1 - placar2;

time2.saldo += placar2 - placar1;



if(placar1 > placar2){


time1.vitorias++;

time2.derrotas++;

time1.pontos += 3;


}


else if(placar2 > placar1){


time2.vitorias++;

time1.derrotas++;

time2.pontos += 3;


}


else{


time1.pontos++;

time2.pontos++;


}


}


}


});



classificacao.sort((a,b)=>{


if(b.pontos !== a.pontos)

return b.pontos-a.pontos;


if(b.vitorias !== a.vitorias)

return b.vitorias-a.vitorias;


return b.saldo-a.saldo;


});



if(classificacao.length < 6){

alert("Cadastre 6 equipes para gerar os playoffs!");

return;

}



playoffs={


primeiro:classificacao[0].nome,

segundo:classificacao[1].nome,


playoff1:{

time1:classificacao[2].nome,

time2:classificacao[5].nome,

vencedor:""

},


playoff2:{

time1:classificacao[3].nome,

time2:classificacao[4].nome,

vencedor:""

},


semi:{

time1:"",

time2:"",

vencedor:""

},


final:{

time1:"",

time2:"",

formato:"MD5",

vencedor:""

}


};



salvar();

mostrar();


}




function definirVencedor(fase){


let vencedor = prompt("Digite o nome da equipe vencedora");


if(!vencedor)return;



if(fase==="playoff1"){

playoffs.playoff1.vencedor=vencedor;

}



if(fase==="playoff2"){

playoffs.playoff2.vencedor=vencedor;

}



if(
playoffs.playoff1.vencedor &&
playoffs.playoff2.vencedor
){


playoffs.semi.time1=playoffs.segundo;

playoffs.semi.time2=playoffs.playoff1.vencedor;


}



if(fase==="semi"){


playoffs.semi.vencedor=vencedor;


playoffs.final.time1=playoffs.primeiro;

playoffs.final.time2=vencedor;


}



if(fase==="final"){


playoffs.final.vencedor=vencedor;


}



salvar();

mostrar();


}




function salvar(){


localStorage.setItem(

"playoffs",

JSON.stringify(playoffs)

);


}





function mostrar(){


let div=document.getElementById("chave");


if(!div)return;


div.innerHTML="";



if(!playoffs.playoff1)return;



div.innerHTML += `


<div class="jogo">

<h3>🔥 Playoff 1</h3>

${playoffs.playoff1.time1}

🆚

${playoffs.playoff1.time2}


<button onclick="definirVencedor('playoff1')">

Definir vencedor

</button>

</div>



<div class="jogo">

<h3>🔥 Playoff 2</h3>

${playoffs.playoff2.time1}

🆚

${playoffs.playoff2.time2}


<button onclick="definirVencedor('playoff2')">

Definir vencedor

</button>

</div>



<div class="jogo vencedor">

<h3>⚔️ Semifinal</h3>


${playoffs.semi.time1 || "Aguardando"}

🆚

${playoffs.semi.time2 || "Aguardando"}


<button onclick="definirVencedor('semi')">

Definir vencedor

</button>

</div>



<div class="jogo final">

<h3>🏆 FINAL VCC - MD5</h3>


${playoffs.final.time1 || "Aguardando"}

🆚

${playoffs.final.time2 || "Aguardando"}


<button onclick="definirVencedor('final')">

Definir campeão

</button>

</div>


`;



if(playoffs.final.vencedor){


div.innerHTML += `

<div class="jogo campeao">

🏆 CAMPEÃO VCC

<br>

${playoffs.final.vencedor}

</div>

`;

}


}



mostrar();


</script>
