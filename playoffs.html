<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Playoffs VCC</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f1f1f1;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:800px;
margin:auto;
}

h2{
text-align:center;
}


button{
width:100%;
padding:12px;
margin-top:10px;
background:#0066ff;
color:white;
border:none;
border-radius:5px;
font-size:16px;
}


.jogo{

background:#eee;
padding:15px;
margin-top:15px;
border-radius:10px;
text-align:center;

}


.vencedor{

background:#d4ffd4;

}


.final{

background:#fff3cd;

}


.campeao{

background:#ffd700;
font-weight:bold;
font-size:20px;

}


</style>

</head>


<body>


<div class="container">


<h2>🏆 Playoffs VCC</h2>


<button onclick="gerarPlayoffs()">

Gerar Chave dos Playoffs

</button>


<div id="chave"></div>


</div>

<script>

let playoffs = JSON.parse(localStorage.getItem("playoffs")) || {};



function gerarPlayoffs(){

let classificacao = JSON.parse(localStorage.getItem("classificacaoFinal")) || [];


if(classificacao.length < 6){

alert("É necessário ter 6 equipes classificadas!");

return;

}



playoffs = {

primeiro: classificacao[0].nome,

segundo: classificacao[1].nome,


playoff1:{

time1: classificacao[2].nome,

time2: classificacao[5].nome,

vencedor:""

},


playoff2:{

time1: classificacao[3].nome,

time2: classificacao[4].nome,

vencedor:""

},


semi:{

time1:"",

time2:"",

vencedor:""

},


final:{

time1:"",

time2:"",

formato:"MD5",

vencedor:""

}


};


salvar();

mostrar();

}




function definirVencedor(fase){


let vencedor = prompt("Digite o nome da equipe vencedora");


if(!vencedor)return;



if(fase==="playoff1"){

playoffs.playoff1.vencedor=vencedor;

}


if(fase==="playoff2"){

playoffs.playoff2.vencedor=vencedor;

}


if(
playoffs.playoff1.vencedor &&
playoffs.playoff2.vencedor
){

playoffs.semi.time1=playoffs.segundo;

playoffs.semi.time2=
playoffs.playoff1.vencedor;


}


if(fase==="semi"){

playoffs.semi.vencedor=vencedor;


playoffs.final.time1=playoffs.primeiro;

playoffs.final.time2=vencedor;

}


if(fase==="final"){

playoffs.final.vencedor=vencedor;

}


salvar();

mostrar();

}




function salvar(){

localStorage.setItem(
"playoffs",
JSON.stringify(playoffs)
);

}




function mostrar(){


let div=document.getElementById("chave");


div.innerHTML="";


if(!playoffs.playoff1)return;



div.innerHTML += `


<div class="jogo">

<h3>Playoff 1</h3>

${playoffs.playoff1.time1}

🆚

${playoffs.playoff1.time2}


<button onclick="definirVencedor('playoff1')">

Definir vencedor

</button>


</div>



<div class="jogo">

<h3>Playoff 2</h3>

${playoffs.playoff2.time1}

🆚

${playoffs.playoff2.time2}


<button onclick="definirVencedor('playoff2')">

Definir vencedor

</button>


</div>



<div class="jogo vencedor">

<h3>Semifinal</h3>


${playoffs.semi.time1 || "Aguardando"}

🆚
