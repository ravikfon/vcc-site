<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Playoffs VCC</title>

<style>

*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
margin:0;
padding:20px;
background:#111827;
color:white;
}


.container{

max-width:900px;
margin:auto;
background:#1f2937;
padding:25px;
border-radius:15px;

}


h2{

text-align:center;
color:#60a5fa;

}



button{

width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;

}


button:hover{

background:#1d4ed8;

}



.jogo{

background:#374151;
padding:20px;
margin-top:15px;
border-radius:12px;
text-align:center;

}


.time{

font-size:18px;
font-weight:bold;

}



.fase{

color:#93c5fd;
font-size:20px;
margin-bottom:10px;

}


.final{

border:2px solid #facc15;

}


.campeao{

background:#facc15;
color:#111;
font-size:22px;
font-weight:bold;

}



.aguardando{

color:#9ca3af;

}


</style>

</head>


<body>


<div class="container">


<h2>🏆 Playoffs VCC</h2>


<button onclick="gerarPlayoffs()">

Gerar Nova Chave

</button>


<div id="chave"></div>


</div>


<script>


let playoffs =
JSON.parse(localStorage.getItem("playoffs")) || {};



function salvar(){


localStorage.setItem(

"playoffs",

JSON.stringify(playoffs)

);


}
function gerarPlayoffs(){


let tabela =
JSON.parse(localStorage.getItem("classificacaoFinal")) || [];



if(tabela.length < 6){

alert("Abra primeiro a classificação para gerar a tabela!");

return;

}



playoffs = {


primeiro:tabela[0].nome,

segundo:tabela[1].nome,



playoff1:{

time1:tabela[2].nome,

time2:tabela[5].nome,

vencedor:""

},



playoff2:{

time1:tabela[3].nome,

time2:tabela[4].nome,

vencedor:""

},



playoff3:{

time1:"",

time2:"",

vencedor:""

},



semi:{

time1:tabela[1].nome,

time2:"",

vencedor:""

},



final:{

time1:tabela[0].nome,

time2:"",

formato:"MD5",

vencedor:""

}


};



salvar();

mostrar();


}





function abrirSerie(fase){


localStorage.setItem(

"serieAtual",

fase

);



window.location="serie.html";


}
function mostrar(){


let div = document.getElementById("chave");


div.innerHTML="";



if(!playoffs.playoff1){

return;

}



div.innerHTML += `



<div class="jogo">

<div class="fase">🔥 Playoff 1</div>


<div class="time">

${playoffs.playoff1.time1}

🆚

${playoffs.playoff1.time2}

</div>


<button onclick="abrirSerie('playoff1')">

🎮 Administrar Série

</button>


</div>





<div class="jogo">

<div class="fase">🔥 Playoff 2</div>


<div class="time">

${playoffs.playoff2.time1}

🆚

${playoffs.playoff2.time2}

</div>


<button onclick="abrirSerie('playoff2')">

🎮 Administrar Série

</button>


</div>





<div class="jogo">

<div class="fase">🔥 Playoff 3</div>


<div class="time">

${playoffs.playoff3.time1 || "Aguardando"}

🆚

${playoffs.playoff3.time2 || "Aguardando"}

</div>


<button onclick="abrirSerie('playoff3')">

🎮 Administrar Série

</button>


</div>





<div class="jogo">

<div class="fase">⚔️ Semifinal</div>


<div class="time">

${playoffs.semi.time1}

🆚

${playoffs.semi.time2 || "Aguardando"}

</div>


<button onclick="abrirSerie('semi')">

🎮 Administrar Série

</button>


</div>





<div class="jogo final">

<div class="fase">🏆 FINAL MD5</div>


<div class="time">

${playoffs.final.time1}

🆚

${playoffs.final.time2 || "Aguardando"}

</div>


<button onclick="abrirSerie('final')">

🎮 Administrar Série

</button>


</div>



`;



if(playoffs.final.vencedor){


div.innerHTML += `


<div class="jogo campeao">


🏆 CAMPEÃO VCC


<br><br>


${playoffs.final.vencedor}


</div>


`;

}



}





mostrar();


</script>


</body>

</html>
