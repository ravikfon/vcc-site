<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jogadores VCC</title>


<style>

body{

font-family:Arial,sans-serif;
background:#f1f1f1;
padding:20px;

}


.container{

background:white;
padding:20px;
border-radius:10px;
max-width:700px;
margin:auto;

}


input,select,button{

width:100%;
padding:12px;
margin-top:10px;
border-radius:5px;
border:1px solid #ccc;

}


button{

background:#0066ff;
color:white;
border:none;
cursor:pointer;

}


.jogador{

background:#eee;
padding:15px;
margin-top:15px;
border-radius:8px;

}


.excluir{

background:red;

}


</style>


</head>


<body>


<div class="container">


<h2>👤 Cadastro de Jogadores VCC</h2>



<label>Nome do jogador</label>

<input id="nome" placeholder="Digite o nome">



<label>Nick no jogo</label>

<input id="nick" placeholder="Digite o nick">



<label>Equipe</label>

<select id="equipe">

</select>



<button onclick="salvarJogador()">

Cadastrar Jogador

</button>



<h3>Jogadores cadastrados</h3>


<div id="lista">

</div>


</div>
<script>


let equipes =
JSON.parse(localStorage.getItem("equipes")) || [];


let jogadores =
JSON.parse(localStorage.getItem("jogadores")) || [];



// Carregar equipes no campo de seleção

function carregarEquipes(){


let select =
document.getElementById("equipe");


select.innerHTML = "";


equipes.forEach(e=>{


select.innerHTML += `

<option value="${e.nome}">

${e.nome}

</option>

`;


});


}



// Salvar jogador

function salvarJogador(){


let jogador = {


nome:
document.getElementById("nome").value,


nick:
document.getElementById("nick").value,


equipe:
document.getElementById("equipe").value


};



if(!jogador.nome || !jogador.nick){

alert("Preencha todos os campos!");

return;

}



jogadores.push(jogador);



localStorage.setItem(

"jogadores",

JSON.stringify(jogadores)

);



document.getElementById("nome").value="";

document.getElementById("nick").value="";


mostrarJogadores();


}



// Mostrar jogadores

function mostrarJogadores(){


let lista =
document.getElementById("lista");


lista.innerHTML="";



jogadores.forEach((j,index)=>{


lista.innerHTML += `


<div class="jogador">


<strong>

👤 ${j.nome}

</strong>


<br>

🎮 Nick: ${j.nick}


<br>

🏆 Equipe: ${j.equipe}


<br><br>


<button class="excluir" onclick="excluirJogador(${index})">

Excluir

</button>


</div>


`;


});


}



// Excluir

function excluirJogador(index){


jogadores.splice(index,1);


localStorage.setItem(

"jogadores",

JSON.stringify(jogadores)

);


mostrarJogadores();


}



carregarEquipes();

mostrarJogadores();



</script>
