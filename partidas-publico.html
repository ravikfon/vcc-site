<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Partidas VCC</title>

<style>

body{
font-family:Arial,sans-serif;
background:#111827;
color:white;
padding:20px;
}


.container{
max-width:900px;
margin:auto;
background:#1f2937;
padding:20px;
border-radius:15px;
}


h1{
text-align:center;
color:#60a5fa;
}


.partida{
background:#374151;
padding:20px;
margin-top:15px;
border-radius:10px;
text-align:center;
}


.times{
font-size:20px;
font-weight:bold;
}


.finalizada{
color:#22c55e;
}


.aguardando{
color:#facc15;
}


.voltar{
display:block;
margin-top:20px;
text-align:center;
background:#2563eb;
padding:12px;
border-radius:8px;
color:white;
text-decoration:none;
}


</style>

</head>


<body>


<div class="container">


<h1>🎮 Partidas VCC</h1>


<div id="listaPartidas">

Carregando partidas...

</div>


<a class="voltar" href="index.html">

⬅ Voltar ao início

</a>


</div>



<script>

let partidas =
JSON.parse(localStorage.getItem("partidas")) || [];


let lista =
document.getElementById("listaPartidas");



if(partidas.length === 0){

lista.innerHTML = `
<p>🎮 Nenhuma partida cadastrada.</p>
`;

}else{


lista.innerHTML = "";


partidas.forEach((p,index)=>{


lista.innerHTML += `


<div class="partida">


<h3>

🔥 Série MD3 #${index + 1}

</h3>


<div class="times">

${p.time1}

🆚

${p.time2}

</div>


<br>


📅 ${p.data || "Data não definida"}

<br>

⏰ ${p.hora || "Horário não definido"}



${p.finalizada ? `


<div class="finalizada">


<br>

🏆 Série Finalizada


<br><br>


Placar:

<br>

${p.time1} ${p.mapas1} x ${p.mapas2} ${p.time2}


<br><br>


🎯 Rounds:

<br>

${p.rounds1} x ${p.rounds2}


<br><br>


👑 Vencedor:

<br>

${p.vencedor}


</div>


` : `


<div class="aguardando">

<br>

⏳ Aguardando resultado

</div>


`}


</div>


`;


});


}


</script>


</body>

</html>
