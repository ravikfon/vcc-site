<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Partidas VCC</title>

<style>

body{
font-family:Arial;
background:#f1f1f1;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:600px;
margin:auto;
}

input,button{
width:100%;
padding:12px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#0066ff;
color:white;
border:none;
}

.partida{
background:#eee;
padding:12px;
margin-top:10px;
border-radius:5px;
}

</style>

</head>


<body>


<div class="container">


<h2>📅 Agenda de Partidas VCC</h2>


<input id="time1" placeholder="Equipe 1">


<input id="time2" placeholder="Equipe 2">


<input id="data" type="date">


<input id="hora" type="time">


<button onclick="salvarPartida()">
Adicionar Partida
</button>


<h3>Partidas agendadas:</h3>


<div id="lista"></div>


</div>



<script>


let partidas = JSON.parse(localStorage.getItem("partidas")) || [];



function salvarPartida(){


let partida = {

time1:document.getElementById("time1").value,

time2:document.getElementById("time2").value,

data:document.getElementById("data").value,

hora:document.getElementById("hora").value

};



partidas.push(partida);



localStorage.setItem("partidas",JSON.stringify(partidas));



mostrarPartidas();



}




function mostrarPartidas(){


let lista=document.getElementById("lista");


lista.innerHTML="";



partidas.forEach((p,index)=>{


lista.innerHTML += `

<div class="partida">

<strong>${p.time1} 🆚 ${p.time2}</strong><br>

📅 ${p.data}<br>

⏰ ${p.hora}

</div>

`;

});


}



mostrarPartidas();



</script>


</body>

</html>
