<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Partidas VCC</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f1f1f1;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:700px;
margin:auto;
}

select,
input,
button{

width:100%;
padding:12px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;

}

button{

background:#0066ff;
color:white;
border:none;
cursor:pointer;

}

.partida{

background:#eee;
padding:15px;
margin-top:15px;
border-radius:8px;

}

.finalizada{

background:#d4ffd4;

}

.excluir{

background:red;

}

.editar{

background:#009900;

}

.resultado{

margin-top:10px;
padding:10px;
background:white;
border-radius:5px;

}

</style>

</head>


<body>


<div class="container">


<h2>🎮 Agenda de Partidas VCC</h2>


<h3>Nova Série MD3</h3>


<label>Equipe 1</label>

<select id="time1"></select>


<label>Equipe 2</label>

<select id="time2"></select>



<input id="data" type="date">


<input id="hora" type="time">


<button onclick="salvarPartida()">

Adicionar Série

</button>



<h3>Partidas Agendadas</h3>


<div id="lista"></div>


</div>


<script>
  // Lista de equipes cadastradas
let equipes = JSON.parse(localStorage.getItem("equipes")) || [];

let partidas = JSON.parse(localStorage.getItem("partidas")) || [];

let editando = -1;


// Carregar equipes nos campos de seleção
function carregarEquipes(){

let select1 = document.getElementById("time1");
let select2 = document.getElementById("time2");


select1.innerHTML = "";
select2.innerHTML = "";


equipes.forEach(e=>{

select1.innerHTML += `
<option value="${e.nome}">
${e.nome}
</option>
`;

select2.innerHTML += `
<option value="${e.nome}">
${e.nome}
</option>
`;

});


}


function salvarPartida(){


let partida = {

time1:document.getElementById("time1").value,

time2:document.getElementById("time2").value,

data:document.getElementById("data").value,

hora:document.getElementById("hora").value,


// Dados da MD3
mapas1:0,
mapas2:0,

rounds1:0,
rounds2:0,


finalizada:false

};



if(editando === -1){

partidas.push(partida);

}else{

partidas[editando] = partida;

editando = -1;

}



localStorage.setItem(
"partidas",
JSON.stringify(partidas)
);



mostrarPartidas();


}



function editarPartida(index){


let p = partidas[index];


document.getElementById("time1").value = p.time1;

document.getElementById("time2").value = p.time2;

document.getElementById("data").value = p.data;

document.getElementById("hora").value = p.hora;


editando = index;


}




function excluirPartida(index){


let confirmar = confirm(
"Deseja excluir esta partida?"
);


if(confirmar){

partidas.splice(index,1);


localStorage.setItem(
"partidas",
JSON.stringify(partidas)
);


mostrarPartidas();

}


}



function mostrarPartidas(){


let lista=document.getElementById("lista");


lista.innerHTML="";



partidas.forEach((p,index)=>{


lista.innerHTML += `

<div class="partida">


<strong>
${p.time1} 🆚 ${p.time2}
</strong>

<br>

📅 ${p.data}

<br>

⏰ ${p.hora}


${p.finalizada ? `

<div class="resultado">

🏆 Série finalizada

<br>

${p.time1} ${p.mapas1} x ${p.mapas2} ${p.time2}

<br>

🎯 Rounds:
${p.rounds1} x ${p.rounds2}

</div>


`:""}



${!p.finalizada ? `

<button onclick="editarPartida(${index})" class="editar">

Editar

</button>


<button onclick="finalizarPartida(${index})">

Finalizar MD3

</button>


`:""}



<button onclick="excluirPartida(${index})" class="excluir">

Excluir

</button>


</div>

`;

});


}



// iniciar página

carregarEquipes();

mostrarPartidas();
function finalizarPartida(index){


let p = partidas[index];


// Mapas
let mapas1 = prompt(
"Quantos mapas "+p.time1+" ganhou? (0,1 ou 2)"
);

let mapas2 = prompt(
"Quantos mapas "+p.time2+" ganhou? (0,1 ou 2)"
);


// Rounds
let rounds1 = prompt(
"Quantos rounds "+p.time1+" fez?"
);

let rounds2 = prompt(
"Quantos rounds "+p.time2+" fez?"
);



if(mapas1 === null || mapas2 === null || rounds1 === null || rounds2 === null){

return;

}



mapas1 = Number(mapas1);
mapas2 = Number(mapas2);

rounds1 = Number(rounds1);
rounds2 = Number(rounds2);



p.mapas1 = mapas1;

p.mapas2 = mapas2;

p.rounds1 = rounds1;

p.rounds2 = rounds2;


p.finalizada = true;



if(mapas1 > mapas2){

p.vencedor = p.time1;

}else{

p.vencedor = p.time2;

}



localStorage.setItem(
"partidas",
JSON.stringify(partidas)
);



mostrarPartidas();



}
mostrarPartidas();

</script>

</body>

</html>
